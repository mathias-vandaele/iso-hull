name: Publish crate

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to crates.io'
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Run default test suite
        run: cargo test --locked

      - name: Run all-features test suite
        run: cargo test --locked --all-features

      - name: Verify benchmark builds
        run: cargo bench --locked --bench examples --no-run

      - name: Verify publish isohull (dry-run)
        run: cargo publish --locked --dry-run
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_API_KEY }}

      - name: Publish isohull to crates.io
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.publish == 'true'
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_API_KEY }}

  release:
    needs: publish
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          tag="${GITHUB_REF_NAME}"

          if gh release view "$tag" --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release edit "$tag" --repo "$GH_REPO" --title "$tag" --notes ""
          else
            gh release create "$tag" --repo "$GH_REPO" --title "$tag" --notes ""
          fi
